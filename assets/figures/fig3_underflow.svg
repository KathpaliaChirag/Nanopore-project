<text x="28" y="38" font-size="20" font-weight="700" fill="#0b0b0b">The odometer P_t dives toward zero, then off a cliff</text>
<text x="28" y="62" font-size="13" fill="#52514e">P_t = 0.8^t is a product of numbers below 1. Past the float floor the machine rounds it to exactly 0, and b*x/P explodes.</text>
