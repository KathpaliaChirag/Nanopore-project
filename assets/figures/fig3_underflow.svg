<text x="140" y="366" font-size="11" fill="#898781">ticks = chunk boundaries (every 64): resetting P here keeps it far above the cliff</text>
<text x="390" y="402" font-size="11" fill="#898781" text-anchor="middle">step t</text>
<text x="28" y="400" font-size="12.5" fill="#52514e">The real fix isn't chunking, it's working in log-space (add log a's, subtract) so you never divide tiny numbers. Chunking is extra safety.</text>
