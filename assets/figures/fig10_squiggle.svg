<text x="28" y="38" font-size="20" font-weight="700" fill="#0b0b0b">What the nanopore signal actually is</text>
<text x="28" y="62" font-size="13" fill="#52514e">The current is a fingerprint of a WINDOW of bases in the pore at once, and the signal is ~10x longer than the DNA it encodes.</text>
<text x="70" y="106" font-size="11" fill="#898781">current (pA)</text>
